font:
  - file:
      type: gfonts
      family: ${font_family}
      weight: 300
      italic: true
    id: font_request
    size: 15
    glyphsets:
      - ${font_glyphsets}
  - file:
      type: gfonts
      family: ${font_family}
      weight: 300
    id: font_response
    size: 15
    glyphsets:
      - ${font_glyphsets}
  - file:
      type: gfonts
      family: ${font_family}
      weight: 300
    id: font_timer
    size: 30
    glyphsets:
      - ${font_glyphsets}
  - file:
      type: gfonts
      family: ${font_family}
      weight: 500
    id: font_idle_time
    size: 48
    glyphsets:
      - ${font_glyphsets}
  - file:
      type: gfonts
      family: ${font_family}
      weight: 400
    id: font_idle_date
    size: 18
    glyphsets:
      - ${font_glyphsets}

sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${friendly_name} Uptime"

  - platform: debug
    free:
      name: "${friendly_name} Heap Free"
    block:
      name: "${friendly_name} Heap Max Block"
    loop_time:
      name: "${friendly_name} Loop Time"

text_sensor:
  - platform: template
    name: "${friendly_name} Firmware Build"
    entity_category: diagnostic
    lambda: |-
      return std::string("Build ${build_id}; ESPHome ${build_esphome_version}; ${build_time}");

  - platform: template
    name: "${friendly_name} IP Address"
    update_interval: 60s
    lambda: |-
      auto ips = network::get_ip_addresses();
      if (!ips[0].is_set())
        return {};
      char buf[network::IP_ADDRESS_BUFFER_SIZE];
      ips[0].str_to(buf);
      return std::string(buf);

  - platform: debug
    reset_reason:
      name: "${friendly_name} Reset Reason"
    device:
      name: "${friendly_name} Device Info"

  - id: text_request
    platform: template
    update_interval: never
    on_value:
      lambda: |-
        auto &state = id(text_request).state;
        for (auto &ch : state) {
          if (ch == '\r' || ch == '\n' || ch == '\t')
            ch = ' ';
        }
        if (state.length() > 78) {
          state.resize(75);
          state.append("...");
        }

  - id: text_response
    platform: template
    update_interval: never
    on_value:
      lambda: |-
        auto &state = id(text_response).state;
        for (auto &ch : state) {
          if (ch == '\r' || ch == '\n' || ch == '\t')
            ch = ' ';
        }
        if (state.length() > 78) {
          state.resize(75);
          state.append("...");
        }

color:
  - id: idle_color
    hex: ${idle_illustration_background_color}
  - id: listening_color
    hex: ${listening_illustration_background_color}
  - id: thinking_color
    hex: ${thinking_illustration_background_color}
  - id: replying_color
    hex: ${replying_illustration_background_color}
  - id: loading_color
    hex: ${loading_illustration_background_color}
  - id: error_color
    hex: ${error_illustration_background_color}
  - id: active_timer_color
    hex: "26ed3a"
  - id: paused_timer_color
    hex: "3b89e3"

spi:
  - id: spi_bus
    interface: software
    clk_pin:
      pca9554: io_expander
      number: 2
      mode:
        output: true
    mosi_pin:
      pca9554: io_expander
      number: 1
      mode:
        output: true

display:
  - platform: mipi_rgb
    id: s3_box_lcd
    model: WAVESHARE-4-480X480
    dimensions:
      width: 480
      height: 480
    color_order: RGB
    pixel_mode: 18bit
    invert_colors: true
    data_rate: 2MHz
    spi_mode: MODE3
    cs_pin:
      pca9554: io_expander
      number: 0
      mode:
        output: true
    reset_pin:
      pca9554: io_expander
      number: 7
      mode:
        output: true
    pclk_frequency: 12MHz
    pclk_inverted: false
    hsync_pulse_width: 10
    hsync_back_porch: 10
    hsync_front_porch: 20
    vsync_pulse_width: 10
    vsync_back_porch: 10
    vsync_front_porch: 10
    de_pin: GPIO17
    pclk_pin: GPIO9
    hsync_pin:
      number: GPIO46
      ignore_strapping_warning: true
    vsync_pin:
      number: GPIO3
      ignore_strapping_warning: true
    data_pins:
      red:
        - GPIO40
        - GPIO41
        - GPIO42
        - GPIO2
        - GPIO1
      green:
        - GPIO21
        - GPIO8
        - GPIO18
        - GPIO45
        - GPIO38
        - GPIO39
      blue:
        - GPIO10
        - GPIO11
        - GPIO12
        - GPIO13
        - GPIO14
    update_interval: never
    pages:
      - id: ota_update_page
        lambda: |-
          const int screen_w = it.get_width();
          const int bar_x = 60;
          const int bar_y = 284;
          const int bar_w = screen_w - 120;
          const int bar_h = 28;
          const float progress = std::min(std::max(id(ota_update_progress), 0.0f), 100.0f);
          const int filled = static_cast<int>(roundf(bar_w * progress / 100.0f));

          it.fill(Color::BLACK);
          it.printf(screen_w / 2, 180, id(font_timer), Color::WHITE, TextAlign::CENTER, "Update in progress...");
          it.rectangle(bar_x, bar_y, bar_w, bar_h, Color::WHITE);
          if (filled > 0)
            it.filled_rectangle(bar_x, bar_y, filled, bar_h, id(active_timer_color));
          it.printf(screen_w / 2, 328, id(font_request), Color::WHITE, TextAlign::CENTER, "%.0f%%", progress);
      - id: idle_page
        lambda: |-
          it.fill(id(idle_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_idle), ImageAlign::CENTER);
          auto now = id(homeassistant_time).now();
          if (now.is_valid()) {
            char time_buf[6];
            char date_buf[16];
            now.strftime(time_buf, sizeof(time_buf), "%H:%M");
            now.strftime(date_buf, sizeof(date_buf), "%a %d %b");
            const Color idle_clock_color(235, 235, 235);
            it.printf(450, 20, id(font_idle_time), idle_clock_color, TextAlign::TOP_RIGHT, "%s", time_buf);
            it.printf(450, 67, id(font_idle_date), idle_clock_color, TextAlign::TOP_RIGHT, "%s", date_buf);
          }
          id(draw_timer_timeline).execute();
          id(draw_active_timer_widget).execute();
          id(draw_volume_overlay).execute();
          id(draw_countdown_dialog).execute();
      - id: listening_page
        lambda: |-
          it.fill(id(listening_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_listening), ImageAlign::CENTER);
          id(draw_timer_timeline).execute();
          id(draw_volume_overlay).execute();
          id(draw_countdown_dialog).execute();
      - id: thinking_page
        lambda: |-
          auto draw_speech_bubble = [&](const std::string &text, int x, int y, bool align_right, bool italic) {
            if (text.empty())
              return;

            const int max_chars = 36;
            const int bubble_w = 312;
            const int bubble_h = 66;
            const int radius = 8;
            const int pad_x = 14;
            const int pad_y = 11;
            const int line_h = 20;
            const Color bubble_color = Color::WHITE;
            const Color border_color = Color::BLACK;
            const Color text_color = Color::BLACK;
            char line1[40] = {0};
            char line2[40] = {0};
            const char *source = text.c_str();
            size_t len = strlen(source);

            auto copy_line = [&](char *dest, const char *src, size_t count, bool ellipsis) {
              count = std::min<size_t>(count, max_chars);
              memcpy(dest, src, count);
              dest[count] = '\0';
              if (ellipsis && count >= 3) {
                dest[count - 3] = '.';
                dest[count - 2] = '.';
                dest[count - 1] = '.';
              }
            };

            size_t first_len = std::min<size_t>(len, max_chars);
            if (len > max_chars) {
              for (size_t i = first_len; i > 18; i--) {
                if (source[i] == ' ') {
                  first_len = i;
                  break;
                }
              }
            }
            copy_line(line1, source, first_len, false);

            size_t second_start = first_len;
            while (second_start < len && source[second_start] == ' ')
              second_start++;
            if (second_start < len) {
              const size_t remaining = len - second_start;
              copy_line(line2, source + second_start, remaining, remaining > max_chars);
            }

            auto fill_round_rect = [&](int bx, int by, int bw, int bh, int br, Color color) {
              it.filled_rectangle(bx + br, by, bw - 2 * br, bh, color);
              it.filled_rectangle(bx, by + br, bw, bh - 2 * br, color);
              it.filled_circle(bx + br, by + br, br, color);
              it.filled_circle(bx + bw - br - 1, by + br, br, color);
              it.filled_circle(bx + br, by + bh - br - 1, br, color);
              it.filled_circle(bx + bw - br - 1, by + bh - br - 1, br, color);
            };
            fill_round_rect(x, y, bubble_w, bubble_h, radius, border_color);
            fill_round_rect(x + 1, y + 1, bubble_w - 2, bubble_h - 2, radius - 1, bubble_color);

            const int text_x = align_right ? x + bubble_w - pad_x : x + pad_x;
            const TextAlign text_align = align_right ? TextAlign::TOP_RIGHT : TextAlign::TOP_LEFT;
            auto *font = italic ? id(font_request) : id(font_response);
            it.print(text_x, y + pad_y, font, text_color, text_align, line1, bubble_color);
            if (line2[0] != '\0')
              it.print(text_x, y + pad_y + line_h, font, text_color, text_align, line2, bubble_color);
          };

          it.fill(id(thinking_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_thinking), ImageAlign::CENTER);
          draw_speech_bubble(id(text_request).state, 16, 18, false, true);
          id(draw_timer_timeline).execute();
          id(draw_volume_overlay).execute();
          id(draw_countdown_dialog).execute();
      - id: replying_page
        lambda: |-
          auto draw_speech_bubble = [&](const std::string &text, int x, int y, bool align_right, bool italic) {
            if (text.empty())
              return;

            const int max_chars = 36;
            const int bubble_w = 312;
            const int bubble_h = 66;
            const int radius = 8;
            const int pad_x = 14;
            const int pad_y = 11;
            const int line_h = 20;
            const Color bubble_color = Color::WHITE;
            const Color border_color = Color::BLACK;
            const Color text_color = Color::BLACK;
            char line1[40] = {0};
            char line2[40] = {0};
            const char *source = text.c_str();
            size_t len = strlen(source);

            auto copy_line = [&](char *dest, const char *src, size_t count, bool ellipsis) {
              count = std::min<size_t>(count, max_chars);
              memcpy(dest, src, count);
              dest[count] = '\0';
              if (ellipsis && count >= 3) {
                dest[count - 3] = '.';
                dest[count - 2] = '.';
                dest[count - 1] = '.';
              }
            };

            size_t first_len = std::min<size_t>(len, max_chars);
            if (len > max_chars) {
              for (size_t i = first_len; i > 18; i--) {
                if (source[i] == ' ') {
                  first_len = i;
                  break;
                }
              }
            }
            copy_line(line1, source, first_len, false);

            size_t second_start = first_len;
            while (second_start < len && source[second_start] == ' ')
              second_start++;
            if (second_start < len) {
              const size_t remaining = len - second_start;
              copy_line(line2, source + second_start, remaining, remaining > max_chars);
            }

            auto fill_round_rect = [&](int bx, int by, int bw, int bh, int br, Color color) {
              it.filled_rectangle(bx + br, by, bw - 2 * br, bh, color);
              it.filled_rectangle(bx, by + br, bw, bh - 2 * br, color);
              it.filled_circle(bx + br, by + br, br, color);
              it.filled_circle(bx + bw - br - 1, by + br, br, color);
              it.filled_circle(bx + br, by + bh - br - 1, br, color);
              it.filled_circle(bx + bw - br - 1, by + bh - br - 1, br, color);
            };
            fill_round_rect(x, y, bubble_w, bubble_h, radius, border_color);
            fill_round_rect(x + 1, y + 1, bubble_w - 2, bubble_h - 2, radius - 1, bubble_color);

            const int text_x = align_right ? x + bubble_w - pad_x : x + pad_x;
            const TextAlign text_align = align_right ? TextAlign::TOP_RIGHT : TextAlign::TOP_LEFT;
            auto *font = italic ? id(font_request) : id(font_response);
            it.print(text_x, y + pad_y, font, text_color, text_align, line1, bubble_color);
            if (line2[0] != '\0')
              it.print(text_x, y + pad_y + line_h, font, text_color, text_align, line2, bubble_color);
          };

          it.fill(id(replying_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_replying), ImageAlign::CENTER);
          draw_speech_bubble(id(text_request).state, 16, 18, false, true);
          draw_speech_bubble(id(text_response).state, it.get_width() - 312 - 16, it.get_height() - 66 - 18, true, false);
          id(draw_timer_timeline).execute();
          id(draw_volume_overlay).execute();
          id(draw_countdown_dialog).execute();
      - id: timer_finished_page
        lambda: |-
          auto fill_round_rect = [&](int x, int y, int w, int h, int r, Color color) {
            it.filled_rectangle(x + r, y, w - 2 * r, h, color);
            it.filled_rectangle(x, y + r, w, h - 2 * r, color);
            it.filled_circle(x + r, y + r, r, color);
            it.filled_circle(x + w - r - 1, y + r, r, color);
            it.filled_circle(x + r, y + h - r - 1, r, color);
            it.filled_circle(x + w - r - 1, y + h - r - 1, r, color);
          };

          it.fill(id(idle_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_timer_finished), ImageAlign::CENTER);
          const int box_w = 140;
          const int box_h = 54;
          const int box_x = (it.get_width() - box_w) / 2;
          const int box_y = 213;
          fill_round_rect(box_x, box_y, box_w, box_h, 10, Color::BLACK);
          fill_round_rect(box_x + 3, box_y + 3, box_w - 6, box_h - 6, 7, Color::WHITE);
          it.printf(box_x + (box_w / 2), box_y + 10, id(font_timer), Color::BLACK, TextAlign::TOP_CENTER, "Stop");
          id(draw_volume_overlay).execute();
          id(draw_countdown_dialog).execute();
      - id: error_page
        lambda: |-
          it.fill(id(error_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_error), ImageAlign::CENTER);
          id(draw_volume_overlay).execute();
          id(draw_countdown_dialog).execute();
      - id: no_ha_page
        lambda: |-
          it.image((it.get_width() / 2), (it.get_height() / 2), id(error_no_ha), ImageAlign::CENTER);
          id(draw_volume_overlay).execute();
          id(draw_countdown_dialog).execute();
      - id: no_wifi_page
        lambda: |-
          it.image((it.get_width() / 2), (it.get_height() / 2), id(error_no_wifi), ImageAlign::CENTER);
          id(draw_volume_overlay).execute();
          id(draw_countdown_dialog).execute();
      - id: initializing_page
        lambda: |-
          it.fill(id(loading_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_initializing), ImageAlign::CENTER);
          id(draw_volume_overlay).execute();
          id(draw_countdown_dialog).execute();
      - id: muted_page
        lambda: |-
          it.fill(Color::BLACK);
          id(draw_timer_timeline).execute();
          id(draw_active_timer_widget).execute();
          id(draw_volume_overlay).execute();
          id(draw_countdown_dialog).execute();













































